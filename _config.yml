# Feature List
features                                  :

  - title                                 : Forward to Email
    description                           : Receive every text directly in your inbox, automatically. Perfect for OTPs and 2FA codes you need on your laptop.
    fontawesome_icon_name                 : envelope

  - title                                 : Forward to Telegram
    description                           : Route messages to yourself or a group via a dedicated Telegram bot. Fast, free and reliable.
    fontawesome_icon_name                 : telegram
    fontawesome_icon_prefix               : fab

  - title                                 : Forward to WhatsApp
    description                           : Send incoming SMS straight to a WhatsApp contact or number of your choice.
    fontawesome_icon_name                 : whatsapp
    fontawesome_icon_prefix               : fab

  - title                                 : Forward to Slack
    description                           : Pipe client texts and team notifications into any Slack channel, instantly.
    fontawesome_icon_name                 : slack
    fontawesome_icon_prefix               : fab

  - title                                 : Forward to Discord
    description                           : Deliver SMS to a Discord channel — great for communities, alerts and personal automations.
    fontawesome_icon_name                 : discord
    fontawesome_icon_prefix               : fab

  - title                                 : Forwarding Rules
    description                           : Map specific senders or keywords to specific destinations. Send banking codes to email, family messages to Telegram — your call.
    fontawesome_icon_name                 : filter

  - title                                 : Privacy-First, Encrypted
    description                           : The app never stores your message content. Forwarded data is wrapped in end-to-end RSA-OAEP-SHA256 encryption on the way to its destination.
    fontawesome_icon_name                 : lock

  - title                                 : Built on Apple Shortcuts
    description                           : A native iOS automation using Apple's own framework — no background services, no battery drain, no shady permissions.
    fontawesome_icon_name                 : bolt

  - title                                 : Setup in 5 Minutes
    description                           : Step-by-step in-app onboarding gets your shortcut wired up and tested in under five minutes. Set it once, forget it forever.
    fontawesome_icon_name                 : stopwatch



